interface:
  display_name: "Fons4AI SDD Feature Workflow"
  short_description: "编排正常新需求的 SDD 需求、设计和任务规划流程。"
  default_prompt: "Use $fons4ai-sdd-feature-workflow for normal new feature development: clarify requirements, create technical design, generate task planning, validate SDD artifacts, then stop for implementation approval."

adapter:
  platform: codex
  capabilities:
    multi_agent: true
    parallel: false
    thread_handoff: true
  spawn_method: create_thread
  handoff_method: handoff_thread
  context_isolation: true