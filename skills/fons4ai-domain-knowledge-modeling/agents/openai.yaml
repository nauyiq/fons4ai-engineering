interface:
  display_name: "Fons4ai-domain-knowledge-modeling"
  short_description: "对单个、多个或全部领域/能力域进行深度知识建模，逐问确认后沉淀主文档、适配方案和知识卡片。"
  default_prompt: "使用 $fons4ai-domain-knowledge-modeling 对已建立知识基线的项目进行领域/能力域知识建模；可指定单个、多个或全部建模对象。先读取用户文档、index、可选基线分析报告和源码证据，正式生成前逐个提出阻塞性确认问题，默认一次只问一个问题；确认完成后生成领域/能力域主文档、适配矩阵、按需适配说明和知识卡片；没有横向对比或用户确认时，不得把单个实现写成标准流程或标准能力。"
