interface:
  display_name: "Fons4ai-sdd-change"
  short_description: "受控处理已有 SDD 功能的增量变更，先澄清再生成 CR，并把增量任务追加到任务规划。"
  default_prompt: "Use $fons4ai-sdd-change only for changes to an existing SDD feature: clarify the change, analyze impact, generate a CR, append incremental tasks, then stop for implementation approval. For a brand-new feature, use $fons4ai-sdd-feature-workflow."
